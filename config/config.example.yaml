# KiMP3 configuration example

# Ask before changing files.
interactive: True

# Preview plan only. Must not change filesystem or tags.
dry_run: False

scan:
  # Directories to scan.
  dir_list:
  # - '/media/kimifish/MediaStore/Музыка'
  # - /home/kimifish/Downloads
  # - '/home/pi/Downloads'
  # - '/home/kimifish/kimiside@gmail.com/Music/Песенник'
  # - '/home/kimifish/Downloads/Laserdance/Albums/1987 Future Generation'
  # - '/home/kimifish/Downloads/ППВК'
  # - '/home/kimifish/Downloads/Spasibo'
  - '/home/kimifish/Music/Nirvana/1991. Nevermind-src'
  # - '/home/kimifish/Downloads/VHS Glitch/albums/2016 - Demoniac'
  # - '/junk/kimiside@gmail.com/Music/Песенник'

  # Directory names to skip while scanning.
  skip_dirs: ['.unwanted', '.AppleDouble']

  # Delete empty source directories after successful move operations.
  delete_empty_dirs: True

  # Exact junk filenames that may be deleted during cleanup before empty-dir removal.
  # Keep this list conservative: do not add useful artwork such as cover/front images.
  junk_files:
    - '.DS_Store'
    - 'Thumbs.db'
    - 'desktop.ini'
    - 'ehthumbs.db'
    - 'AlbumArtSmall.jpg'

  # Audio extensions to scan.
  valid_extensions: ['.mp3', '.flac']

  # Operation mode:
  # - auto: external scan dirs copy into collection; collection files move/rename in place.
  # - copy: always copy into collection and write tags only to the copy.
  # - move: move/rename files; external move requires force_external_move=true.
  # - none: report only, no file/tag changes.
  operation: 'auto'

  # Allow moving files from outside collection.directory.
  force_external_move: False

  # Conflict policy:
  # - keep-best: default; score candidates and keep better file/library target.
  # - fail: fail conflicting plans.
  # - skip: skip conflicting plans.
  # - suffix: add numeric suffix to conflicting target path.
  # - replace: replace existing target only with force_replace=true.
  conflict_policy: 'keep-best'

  # Required for conflict_policy=replace.
  force_replace: False

  # Allow planned genre symlink creation in operation=none.
  create_symlinks_in_none: False

  # Common album filenames to be copied/moved with albums.
  common_files:
    - 'AlbumArtSmall.jpg'
    - 'Folder.jpg'
    - 'Thumbs.db'
    - 'front.jpg'
    - 'Cover.jpg'
    - 'Cover.png'
    - 'front.jpeg'

collection:
  # Main music collection directory.
  directory: '/home/kimifish/Music'

  # Check, if album is a compilation by comparing artists of each song
  compilation_test: True

  # Coefficient for compilation test.
  # How many songs of all in directory must have different artists
  # to treat it as a compilation.
  compilation_coef: 0.5

  # Create symlinks to files in genre folders.
  create_genre_links: True

  # Clean broken symlinks inside managed genre directory.
  clean_symlinks: True

paths:
  # Patterns for creating paths relative to collection.directory.
  #           • %album_title                  • %song_title
  #           • %album_artist                 • %song_artist
  #           • %num_of_tracks                • %genre
  #           • %track_num                    • %year
  #           • %disc_num                     • %ext
  patterns:
    album: '%album_artist/%year - %album_title (CD%disc_num)/%track_num. %song_title.%ext'
    compilation: '_Сборники/%album_title (CD%disc_num)/%track_num. %song_artist - %song_title.%ext'
    genre: '_Жанры/%genre/%year. %song_artist - %song_title.%ext'

  cache_dir: '/home/kimifish/.cache/kimp3'

tags:

  # Fetch tags from Last.FM and try to correct bad and unused tags:
  fetch_tags: True
  fetch_album_cover: True
  fetch_lyrics: True
  
  # Skip fetching if content already exists in the file
  skip_existing_tags: True
  skip_existing_cover: True
  skip_existing_lyrics: True

  # You need API_KEY and API_SECRET from https://www.last.fm/api/account.
  # Use .env to read from LASTFM_API_KEY / LASTFM_API_SECRET etc.
  lastfm_api_key: .env
  lastfm_api_secret: .env
  genius_token: .env

  # In order to perform a write operation you need to authenticate yourself
  # It's not necessary for read operations
  lastfm_username: .env
  lastfm_password_hash: .env

  # Maximum Last.FM tag length.
  max_length: 50

  # Move «The» from beginning to the end of artist name. The Beatles → Beatles, the
  # Or just remove it. Or leave. 'leave', 'move' or 'remove'
  the_the: 'remove'

  # Allowed genre tags
