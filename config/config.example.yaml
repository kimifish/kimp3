# KiMP3 configuration example

interactive: true
dry_run: false
scan:
  dir_list:
    - /home/kimifish/Music/Nirvana/1991. Nevermind-src
  skip_dirs:
    - .unwanted
    - .AppleDouble
  delete_empty_dirs: true
  junk_files:
    - .DS_Store
    - Thumbs.db
    - desktop.ini
    - ehthumbs.db
    - AlbumArtSmall.jpg
  valid_extensions:
    - .mp3
    - .flac
  operation: auto
  force_external_move: false
  verify_after_write: true
  conflict_policy: keep-best
  force_replace: false
  create_symlinks_in_none: false
  common_files:
    - AlbumArtSmall.jpg
    - Folder.jpg
    - Thumbs.db
    - front.jpg
    - Cover.jpg
    - Cover.png
    - front.jpeg
collection:
  directory: ~/Music
  compilation_test: true
  compilation_coef: 0.5
  create_genre_links: true
  clean_symlinks: true
paths:
  patterns:
    album: "%album_artist/%year - %album_title/%?disc_num{%disc_num-}%track_num. %song_title.%ext"
    compilation: _Сборники/%album_title/%?disc_num{%disc_num-}%track_num. %song_artist - %song_title.%ext
    genre: _Жанры/%genre/%year. %song_artist - %song_title.%ext
  cache_dir: /home/kimifish/.cache/kimp3
tags:
  fetch_tags: true
  fetch_workers: 4
  fetch_album_cover: true
  fetch_lyrics: true
  skip_existing_tags: true
  skip_existing_cover: true
  skip_existing_lyrics: true
  album_metadata_source: musicbrainz_first
  musicbrainz_contact: https://github.com/kimifish/kimp3
  lastfm_api_key: .env
  lastfm_api_secret: .env
  genius_token: .env
  lastfm_username: .env
  lastfm_password_hash: .env
  the_the: remove
  use_llm: true
  llm_url: http://kimipc.lan:8000/v1/chat
  llm_timeout: 30
